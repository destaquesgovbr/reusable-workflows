# Reusable Workflow: Deploy DAGs to Cloud Composer
# Called by repos that need to sync local DAG files to the Composer GCS bucket.
#
# Usage:
#   jobs:
#     deploy:
#       uses: destaquesgovbr/reusable-workflows/.github/workflows/composer-deploy-dags.yml@v1
#       with:
#         dags_local_path: dags
#         dags_bucket_subdir: scraper

name: Deploy DAGs to Composer

on:
  workflow_call:
    inputs:
      dags_local_path:
        description: 'Local path to DAGs directory (e.g., dags, src/data_platform/dags)'
        required: true
        type: string
      dags_bucket_subdir:
        description: 'Subdirectory in Composer bucket (e.g., scraper, data-platform)'
        required: true
        type: string
      python_version:
        description: 'Python version for validation'
        required: false
        type: string
        default: '3.11'
      airflow_version:
        description: 'Airflow version for validation'
        required: false
        type: string
        default: '3.0.1'
      airflow_extra_packages:
        description: 'Extra pip packages for validation (space-separated)'
        required: false
        type: string
        default: 'apache-airflow-providers-postgres'
      rsync_exclude:
        description: 'Regex pattern to exclude from gsutil rsync (e.g., requirements\.txt$)'
        required: false
        type: string
        default: ''
      check_imports:
        description: 'Whether to test Python imports beyond syntax checking'
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: inspire-7-finep
  COMPOSER_ENVIRONMENT: destaquesgovbr-composer
  COMPOSER_REGION: us-central1

jobs:
  validate-dags:
    name: Validate DAGs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apache-airflow==${{ inputs.airflow_version }} ${{ inputs.airflow_extra_packages }}

      - name: Validate DAG syntax
        run: |
          echo "Validating DAG files..."
          for dag_file in ${{ inputs.dags_local_path }}/*.py; do
            if [ -f "$dag_file" ]; then
              echo "Checking: $dag_file"
              python -m py_compile "$dag_file"
              echo "  Syntax OK"
            fi
          done
          echo "All DAG files validated successfully!"

      - name: Check for import errors
        if: inputs.check_imports
        run: |
          echo "Checking for import errors..."
          export AIRFLOW_HOME=$(mktemp -d)
          airflow db migrate > /dev/null 2>&1 || true

          for dag_file in ${{ inputs.dags_local_path }}/*.py; do
            if [ -f "$dag_file" ]; then
              echo "Testing imports: $dag_file"
              python -c "
          import sys
          sys.path.insert(0, '.')
          try:
              exec(open('$dag_file').read())
              print('  Imports OK')
          except Exception as e:
              print(f'  Warning: {e}')
              # Don't fail on import errors that might be due to missing Airflow context
          "
            fi
          done

  deploy-dags:
    name: Deploy DAGs to Composer
    needs: validate-dags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/990583792367/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@inspire-7-finep.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Composer DAGs bucket
        id: composer
        run: |
          DAGS_BUCKET=$(gcloud composer environments describe ${{ env.COMPOSER_ENVIRONMENT }} \
            --location=${{ env.COMPOSER_REGION }} \
            --format="value(config.dagGcsPrefix)")
          echo "dags_bucket=$DAGS_BUCKET" >> $GITHUB_OUTPUT
          echo "DAGs bucket: $DAGS_BUCKET"

      - name: List DAGs to deploy
        run: |
          echo "DAGs to be deployed:"
          ls -la ${{ inputs.dags_local_path }}/

      - name: Deploy DAGs to GCS
        run: |
          echo "Syncing DAGs to ${{ steps.composer.outputs.dags_bucket }}/${{ inputs.dags_bucket_subdir }}/..."
          RSYNC_ARGS="-r -d"
          if [ -n "${{ inputs.rsync_exclude }}" ]; then
            RSYNC_ARGS="$RSYNC_ARGS -x '${{ inputs.rsync_exclude }}'"
          fi
          eval gsutil -m rsync $RSYNC_ARGS \
            ${{ inputs.dags_local_path }}/ ${{ steps.composer.outputs.dags_bucket }}/${{ inputs.dags_bucket_subdir }}/
          echo "DAGs deployed successfully!"

      - name: Verify deployment
        run: |
          echo "Verifying DAGs in bucket..."
          gsutil ls -l ${{ steps.composer.outputs.dags_bucket }}/${{ inputs.dags_bucket_subdir }}/

      - name: Wait for Airflow to parse DAGs
        run: |
          echo "Waiting 60 seconds for Airflow to parse new DAGs..."
          sleep 60
